<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ฟอร์มบันทึกข้อมูลนักเรียน</title>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
    font-family:tahoma;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h2{
    text-align:center;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
}

input,select{
    width:100%;
    padding:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#0d6efd;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b5ed7;
}

</style>
</head>

<body>

<div class="container">

    <h2>บันทึกข้อมูลนักเรียน</h2>

    <form id="studentForm">

        <div class="form-group">
            <label>คำนำหน้าชื่อ</label>
            <select id="title" required>
                <option value="">-- เลือก --</option>
                <option>เด็กชาย</option>
                <option>เด็กหญิง</option>
                <option>นาย</option>
                <option>นางสาว</option>
            </select>
        </div>

        <div class="form-group">
            <label>ชื่อ</label>
            <input type="text" id="fname" required>
        </div>

        <div class="form-group">
            <label>นามสกุล</label>
            <input type="text" id="lname" required>
        </div>

        <div class="form-group">
            <label>ชั้นมัธยมศึกษาปีที่</label>
            <input type="number" id="class" min="1" max="6" required>
        </div>

        <div class="form-group">
            <label>ห้อง</label>
            <input type="number" id="room" required>
        </div>

        <div class="form-group">
            <label>เลขที่</label>
            <input type="number" id="number" required>
        </div>

        <button type="submit">
            บันทึกข้อมูล
        </button>

    </form>

</div>

<script>

/**
 * URL Web App
 */
const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxnpSy3EQqD2Ls8OzASdLCsSUXp-5fwRmWjaAe_WhXTKBaIMrlc_JqzBewazdPytWyw7Q/exec";

/**
 * เมื่อกด Submit
 */
document.getElementById("studentForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    // แสดงสถานะกำลังบันทึก
    Swal.fire({
        title: "กำลังบันทึกข้อมูล",
        text: "กรุณารอสักครู่...",
        allowOutsideClick:false,
        didOpen:()=>{
            Swal.showLoading();
        }
    });

    // สร้างชื่อ callback ไม่ซ้ำ
    const callbackName =
      "jsonp_callback_" + Date.now();

    // ฟังก์ชันรับค่ากลับจาก Apps Script
    window[callbackName] = function(response){

        Swal.close();

        if(response.status){

            Swal.fire({
                icon:"success",
                title:"สำเร็จ",
                text:"บันทึกข้อมูลเรียบร้อยแล้ว"
            });

            document
              .getElementById("studentForm")
              .reset();

        }else{

            Swal.fire({
                icon:"error",
                title:"เกิดข้อผิดพลาด",
                text:response.message
            });

        }

        // ลบ script และ callback ออกจาก memory
        delete window[callbackName];
        script.remove();

    };

    // สร้าง URL พร้อมข้อมูล
    const params = new URLSearchParams({
        callback: callbackName,
        title: document.getElementById("title").value,
        fname: document.getElementById("fname").value,
        lname: document.getElementById("lname").value,
        class: document.getElementById("class").value,
        room: document.getElementById("room").value,
        number: document.getElementById("number").value
    });

    // JSONP ใช้วิธีสร้าง script tag
    const script = document.createElement("script");

    script.src =
      SCRIPT_URL + "?" + params.toString();

    document.body.appendChild(script);

});

</script>

</body>
</html>
